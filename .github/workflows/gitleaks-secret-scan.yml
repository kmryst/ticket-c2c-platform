# Gitleaks Secret Scan
# 目的: git 履歴への secret / credential 混入を required status check として検出する
# 実体は kmryst/idp-golden-path の reusable workflow（ADR-0008）。
# このファイルはトリガー・permissions・concurrency のみを持つ薄い caller workflow。
#
# 元は .github/workflows/pr-check.yml 内の gitleaks job だったが、
# reusable workflow化（Issue #297）にあたり独立ファイルに切り出した。
#
# 注意: 本リポジトリの .github/workflows/security-scan.yml（Trivy + CodeQL の週次スキャン）とは別物。
# ファイル名の衝突を避けるため gitleaks-secret-scan.yml とする。
#
# trigger は pull_request のみとする。main への direct push は branch protection で禁止され
# 必ず PR を経由するため、push トリガーを持たなくてもセキュリティカバレッジは低下しない
# （元の pr-check.yml は pull_request + push 両方だった）。

name: Gitleaks Secret Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # idp-golden-path 側の reusable workflow 自身も同名パターンの concurrency group
  # （security-scan-<PR番号>）を持つため、caller 側と同一名にすると
  # 「top level workflow と呼び出し先の間でデッドロック」として GitHub にキャンセルされる
  # （Commitlint移行 #294 で実測。idp-golden-path#106に記録）。
  # caller 側は `-caller` を付けて callee の group と衝突しないようにする。
  group: gitleaks-caller-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # caller job には name を付けない。job id（gitleaks）にフォールバックさせることで、
  # callee側 job 名（Gitleaks Secret Scan）との完全な文字列重複を避ける
  # （Commitlint移行 #294 で判明した可読性上の教訓。idp-golden-path#106参照）。
  gitleaks:
    uses: kmryst/idp-golden-path/.github/workflows/security-scan.yml@v1
