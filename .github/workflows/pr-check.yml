# PR 品質チェックワークフロー
# 目的: main へマージされるコードのビルド可否・Terraform 整合性・シークレット混入を検証する
# 注意: required status check 化する前提のため path フィルタは付けない

name: pr-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  terraform-validate:
    name: Terraform Format & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate (all environment roots)
        run: |
          set -euo pipefail
          for env_dir in terraform/environments/*/; do
            echo "::group::validate ${env_dir}"
            terraform -chdir="$env_dir" init -backend=false -input=false
            terraform -chdir="$env_dir" validate -no-color
            echo "::endgroup::"
          done

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
