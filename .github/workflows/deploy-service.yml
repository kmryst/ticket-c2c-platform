# dev / staging 共通のアプリデプロイ reusable workflow（Issue #180 / #182）。
# deploy-backend-<env>.yml / deploy-frontend-<env>.yml から workflow_call で呼ばれ、
# デプロイ対象（ECR リポジトリ・ECS サービス群・Docker build context）と
# GitHub Environment 名を input で受け取る。backend（api + worker）/ frontend の
# どちらか一方だけをビルド・デプロイする（L-11: デプロイとロールバックの独立性）。
# 承認は呼び出し側が指定する GitHub Environment の protection で行う。
# concurrency group は呼び出し側 workflow で定義する（deploy-backend-dev など）。
name: deploy-service

on:
  workflow_call:
    inputs:
      environment:
        description: "デプロイ承認に使う GitHub Environment 名（dev / staging）"
        required: true
        type: string
      ecr_repository:
        description: "デプロイ対象イメージの ECR リポジトリ名"
        required: true
        type: string
      ecs_cluster:
        description: "ECS クラスタ名"
        required: true
        type: string
      ecs_services:
        description: "更新する ECS サービス名（空白区切り。backend: api + worker / frontend: frontend のみ）"
        required: true
        type: string
      docker_context:
        description: "docker build の context（backend: リポジトリルート '.' / frontend: 'frontend'）"
        required: true
        type: string
      api_service:
        description: "DB migration の run-task に使う API サービス名（run_migrations を使う backend のみ指定）"
        required: false
        type: string
        default: ""
      image_tag:
        description: "デプロイする既存 ECR タグ（省略時は現在のコミットをビルドし short SHA タグでデプロイ。ロールバック時は過去の short SHA を指定）"
        required: false
        type: string
        default: ""
      run_migrations:
        description: "サービス更新前に DB migration を実行する（スキーマ変更を含むリリース時。migration 失敗時はデプロイを中断）"
        required: false
        type: boolean
        default: false
      skip_if_services_missing:
        description: "ECS サービスが ACTIVE でない場合にサービス更新をスキップする（staging alb-http-only では frontend service が存在しないため。ADR-0011）"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  ECR_REPOSITORY: ${{ inputs.ecr_repository }}
  ECS_CLUSTER: ${{ inputs.ecs_cluster }}
  ECS_SERVICES: ${{ inputs.ecs_services }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 更新対象サービスの存在確認。staging の alb-http-only モードでは frontend service が
      # 存在しないため（ADR-0011）、skip_if_services_missing = true の呼び出し（frontend）は
      # サービス更新をスキップする（イメージの build / push は行う）。backend は即失敗させる。
      - name: Check ECS services are active
        id: svc
        run: |
          ACTIVE=true
          for SVC in $ECS_SERVICES; do
            STATUS=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$SVC" \
              --query 'services[0].status' --output text 2>/dev/null || echo "MISSING")
            if [ "$STATUS" != "ACTIVE" ]; then
              ACTIVE=false
              echo "$SVC is not active ($STATUS)"
            fi
          done
          if [ "$ACTIVE" != "true" ]; then
            if [ "${{ inputs.skip_if_services_missing }}" != "true" ]; then
              echo "::error::ECS service(s) not active in cluster $ECS_CLUSTER"
              exit 1
            fi
            echo "service(s) not active, service update will be skipped" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "deploy=$ACTIVE" >> "$GITHUB_OUTPUT"

      # デプロイするタグを決める（production-readiness M-7: タスク定義は commit SHA 固定で参照する）。
      # image_tag 入力があればビルドせず既存タグを使う（ロールバック経路）。存在しないタグは即失敗させる。
      # タグ存在確認は自分の ECR リポジトリのみ行う（L-11: backend / frontend でタグを同期しない。
      # 各 workflow が自分のビルド時点の short SHA を独立して使い、ロールバックも workflow 単位で行う）。
      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
            aws ecr describe-images \
              --repository-name "$ECR_REPOSITORY" \
              --image-ids imageTag="$TAG" \
              --query 'imageDetails[0].imagePushedAt' --output text
            echo "rollback to existing tag $TAG" >> "$GITHUB_STEP_SUMMARY"
          else
            TAG="${GITHUB_SHA::7}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # :latest も併せて push する。これはデプロイには使わず、Terraform 初回 apply 時の
      # タスク定義（image_tag 変数の既定値 latest）が参照できるイメージを残すブートストラップ用。
      - name: Build and push image
        if: inputs.image_tag == ''
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}"
          TAG="${{ steps.tag.outputs.tag }}"
          docker build -t "$IMAGE:latest" -t "$IMAGE:$TAG" "${{ inputs.docker_context }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:$TAG"
          echo "pushed $IMAGE:$TAG" >> "$GITHUB_STEP_SUMMARY"

      # 現行タスク定義のイメージだけを commit SHA タグへ差し替えた新リビジョンを register する。
      # これによりタスク定義から稼働コミットを特定でき、ロールバックは過去タグの再指定だけで済む
      # （再ビルド不要）。サービス更新は migration（任意）の後に行う。
      - name: Register SHA-pinned task definitions
        if: steps.svc.outputs.deploy == 'true'
        id: td
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${{ steps.tag.outputs.tag }}"
          : > td-map.txt
          for SVC in $ECS_SERVICES; do
            CURRENT_TD=$(aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$SVC" \
              --query 'services[0].taskDefinition' --output text)
            aws ecs describe-task-definition \
              --task-definition "$CURRENT_TD" \
              --query 'taskDefinition' > td.json
            jq --arg image "$IMAGE" '
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy, .deregisteredAt)
              | .containerDefinitions[0].image = $image
            ' td.json > td-new.json
            NEW_TD=$(aws ecs register-task-definition \
              --cli-input-json file://td-new.json \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            echo "registered $SVC -> ${NEW_TD##*/} ($IMAGE)" >> "$GITHUB_STEP_SUMMARY"
            echo "$SVC $NEW_TD" >> td-map.txt
            if [ -n "${{ inputs.api_service }}" ] && [ "$SVC" = "${{ inputs.api_service }}" ]; then
              echo "td_api=$NEW_TD" >> "$GITHUB_OUTPUT"
            fi
          done

      # スキーマ変更を含むリリースでは、migration 成功後にサービス更新へ進む（Issue #92）。
      # 新イメージのタスク定義（command override）で migration を実行するため、
      # 旧タスクは旧スキーマのまま動き続け、失敗時はデプロイ自体が中断される。
      - name: Run DB migration (before service update)
        if: inputs.run_migrations && steps.svc.outputs.deploy == 'true'
        # 明示的な shell: bash で pipefail を有効化し、tee が migration 失敗の exit code を隠さないようにする
        shell: bash
        run: |
          ./scripts/deployment/run-db-migration.sh "$ECS_CLUSTER" "${{ inputs.api_service }}" \
            "${{ steps.td.outputs.td_api }}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Update services
        if: steps.svc.outputs.deploy == 'true'
        run: |
          while read -r SVC NEW_TD; do
            aws ecs update-service \
              --cluster "$ECS_CLUSTER" --service "$SVC" \
              --task-definition "$NEW_TD" \
              --query 'service.serviceName' --output text
            echo "updated $SVC -> ${NEW_TD##*/}" >> "$GITHUB_STEP_SUMMARY"
          done < td-map.txt

      - name: Wait for services stable
        if: steps.svc.outputs.deploy == 'true'
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services $ECS_SERVICES
          echo "services stable" >> "$GITHUB_STEP_SUMMARY"
