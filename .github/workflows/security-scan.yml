# セキュリティスキャン統合ワークフロー
# 目的: 依存関係の脆弱性を定期スキャンし GitHub Security タブで一元管理する
# 移植元: kmryst/terraform-hannibal .github/workflows/security-scan.yml（container-scan ジョブは対象外）
# コードの脆弱性（CodeQL javascript-typescript）は .github/workflows/codeql.yml に一本化した
# （idp-golden-pathのreusable workflow経由でPRごとに実行。Issue #305）。
# 本ファイルにあった sast-scan job（週次のみ実行、PR非トリガー）は重複のため削除した。

name: Security Scan
on:
  workflow_dispatch:
  schedule:
    # 毎週月曜 00:15 UTC / 09:15 JST。
    # 毎時0分付近の GitHub Actions 混雑を避けるため15分にずらす。
    - cron: "15 0 * * 1"

concurrency:
  group: security-scan
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Run Trivy vulnerability scanner (fs)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs:
      - dependency-scan
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- SAST Scan (CodeQL javascript-typescript): .github/workflows/codeql.yml を参照" >> $GITHUB_STEP_SUMMARY
          echo "詳細は [Security > Code scanning alerts](../../security/code-scanning) を確認" >> $GITHUB_STEP_SUMMARY
