# dev 専用の backend（api + worker）デプロイ workflow（L-11 / Issue #182）。
# 環境選択入力は持たない。承認は GitHub Environment `dev` の protection で行う。
# デプロイ手順本体は deploy-service.yml（reusable workflow。Issue #180）に共通化し、
# このファイルは dev の backend 固有値を渡すだけにする。
# frontend のデプロイは deploy-frontend-dev.yml（タグ・ロールバックは互いに独立）。
name: deploy-backend-dev

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "デプロイする既存 ECR タグ（省略時は現在のコミットをビルドし short SHA タグでデプロイ。ロールバック時は過去の short SHA を指定）"
        required: false
        type: string
      run_migrations:
        description: "サービス更新前に DB migration を実行する（スキーマ変更を含むリリース時。migration 失敗時はデプロイを中断）"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-backend-dev

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      environment: dev
      ecr_repository: ticket-c2c-dev
      ecs_cluster: ticket-c2c-dev
      ecs_services: "ticket-c2c-dev-api ticket-c2c-dev-worker"
      docker_context: "."
      api_service: ticket-c2c-dev-api
      image_tag: ${{ inputs.image_tag }}
      run_migrations: ${{ inputs.run_migrations }}
