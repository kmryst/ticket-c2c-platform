name: terraform-destroy

# destroy は三重ゲート:
# 1. workflow_dispatch のみ（自動トリガーなし）
# 2. confirm 入力が "destroy-<環境名>" と完全一致
# 3. Environment "<環境名>-destroy" の protection（reviewer 設定時は承認必須）
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "destroy する環境"
        required: true
        type: choice
        options: [dev]
        default: dev
      confirm:
        description: '確認のため "destroy-<環境名>"（例: destroy-dev）を入力'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-${{ inputs.environment }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: inputs.confirm == format('destroy-{0}', inputs.environment)
    environment: ${{ inputs.environment }}-destroy
    defaults:
      run:
        working-directory: terraform/environments/${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.8"

      - name: Configure AWS credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform destroy
        run: terraform destroy -input=false -no-color -auto-approve

      - name: Summary
        run: echo "environment ${{ inputs.environment }} destroyed" >> "$GITHUB_STEP_SUMMARY"
