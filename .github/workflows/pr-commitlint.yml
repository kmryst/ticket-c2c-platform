# PR Commitlint
# 目的: CONTRIBUTING.md の Conventional Commits 規約をコミットメッセージと PR タイトルの両方で検証する
# 実体は kmryst/idp-golden-path の reusable workflow（ADR-0008）。
# このファイルはトリガー・permissions・concurrency のみを持つ薄い caller workflow

name: PR Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read

concurrency:
  # idp-golden-path 側の reusable workflow 自身も同名パターンの concurrency group
  # （commitlint-<PR番号>）を持つため、caller 側と同一名にすると
  # 「top level workflow と呼び出し先の間でデッドロック」として GitHub にキャンセルされる。
  # caller 側は `-caller` を付けて callee の group と衝突しないようにする。
  group: commitlint-caller-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックする（Issue #61）。
  cancel-in-progress: false

jobs:
  # caller job には name を付けない。job id（commitlint）にフォールバックさせることで、
  # required status check 名は `commitlint / Commitlint` になる。
  # caller/callee 双方に `name: Commitlint` を付けると `Commitlint / Commitlint` という
  # 完全に重複した名前になり、コピペミスに見えて可読性を損なうため避ける。
  commitlint:
    # Dependabot の PR タイトルは可変長で header-max-length に抵触し得る。
    # フォーマットは Dependabot 側が決定的に生成するため規約強制の対象外とする（Issue #63）。
    if: github.actor != 'dependabot[bot]'
    uses: kmryst/idp-golden-path/.github/workflows/pr-commitlint.yml@v1
