# dev 専用の terraform apply workflow（staging-environment.md「GitHub Actions」）。
# 環境選択入力は持たない。承認は GitHub Environment `dev` の protection で行う。
name: terraform-apply-dev

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-dev

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: terraform/environments/dev
    steps:
      - uses: actions/checkout@v7

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Configure AWS credentials (apply role)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan.bin

      - name: Terraform apply
        run: terraform apply -input=false -no-color tfplan.bin

      - name: Outputs
        run: terraform output -no-color >> "$GITHUB_STEP_SUMMARY"
