# staging 専用の frontend（Next.js SSR）デプロイ workflow（L-11 / Issue #182）。
# 環境選択入力は持たない。承認は GitHub Environment `staging` の protection で行う。
# デプロイ手順本体は deploy-service.yml（reusable workflow。Issue #180）に共通化し、
# このファイルは staging の frontend 固有値を渡すだけにする。
# backend のデプロイは deploy-backend-staging.yml（タグ・ロールバックは互いに独立）。
name: deploy-frontend-staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "デプロイする既存 ECR タグ（省略時は現在のコミットをビルドし short SHA タグでデプロイ。ロールバック時は過去の short SHA を指定）"
        required: false
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-frontend-staging

jobs:
  deploy:
    uses: ./.github/workflows/deploy-service.yml
    with:
      environment: staging
      ecr_repository: ticket-c2c-staging-frontend
      ecs_cluster: ticket-c2c-staging
      ecs_services: "ticket-c2c-staging-frontend"
      docker_context: "frontend"
      image_tag: ${{ inputs.image_tag }}
      # staging の alb-http-only モードでは frontend service が存在しないためスキップする（ADR-0011）。
      skip_if_services_missing: true
