# Sync Labels
# 目的: ラベル定義の正本 .github/labels.yml を GitHub に自動同期する
# 実体は kmryst/idp-golden-path の reusable workflow（ADR-0008）。
# このファイルはトリガー・permissions のみを持つ薄い caller workflow

name: Sync Labels

on:
  push:
    branches:
      - main
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # caller job には name を付けない。job id（sync-labels）にフォールバックさせることで、
  # callee側 job 名（Sync Labels）との完全な文字列重複を避ける
  # （Commitlint移行 #294 で判明した可読性上の教訓。idp-golden-path#106参照）。
  sync-labels:
    uses: kmryst/idp-golden-path/.github/workflows/sync-labels.yml@v1
