services:
  postgres:
    image: postgres:16-alpine
    container_name: ticket-c2c-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_poc}
      POSTGRES_USER: ${POSTGRES_USER:-ticket_poc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_poc_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ticket_poc} -d ${POSTGRES_DB:-ticket_poc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    container_name: ticket-c2c-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  valkey_data:
